<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Witnessed</title>
    <!-- Runs before any stylesheet is parsed so the popup never flashes
         the wrong theme. Mirrors the inline script used on the site (see
         app/[locale]/layout.tsx). chrome.storage.sync is async so we
         shadow its theme value into localStorage on every change. -->
    <script>
      try {
        var t = localStorage.getItem("witnessedTheme");
        if (t === "light" || t === "dark") {
          document.documentElement.classList.add(t);
        }
      } catch (e) {}
    </script>
    <!-- Fonts are self-hosted in popup.css (@font-face) so the popup never
         reaches out to fonts.googleapis.com on open. See
         extension/public/fonts/ for the woff2 bundle. -->
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main>
      <header class="head">
        <!-- Mirrors the NavBar wordmark on witnessed.cc exactly: Unbounded
             700 uppercase "WITNESSED" baseline-aligned with a small mono
             ".cc" in the accent color. Same DOM shape → same brand. -->
        <a class="wordmark" href="https://witnessed.cc" target="_blank" rel="noopener">
          <span class="wm-main">WITNESSED</span><span class="wm-tld">.cc</span>
        </a>
        <div class="head-right">
          <span class="tag">for Gmail</span>
          <button
            type="button"
            id="theme-toggle"
            class="theme-btn"
            aria-label="Toggle theme"
            title="Toggle light / dark"
          >
            <!-- Icon is swapped at boot by popup.ts to match the active theme -->
          </button>
        </div>
      </header>

      <!-- Live "proof of business" list for every sender domain the
           user can see in the active Gmail tab. Rendered dynamically
           from the content script. -->
      <section class="senders" id="senders">
        <div class="senders-head">
          <div class="senders-title" id="senders-title">Senders in view</div>
          <div class="senders-sub" id="senders-sub">&nbsp;</div>
        </div>

        <div class="senders-empty" id="senders-empty">
          <div class="senders-empty-title">No senders in view</div>
          <div class="senders-empty-sub">
            Open Gmail to verify visible senders.
          </div>
        </div>

        <ul class="senders-list" id="senders-list" hidden></ul>

        <div class="senders-more" id="senders-more" hidden></div>
      </section>

      <!-- Auto-BCC toggle. -->
      <section class="card">
        <div class="row">
          <div>
            <div class="row-label">Auto-seal outgoing</div>
            <div class="row-sub">
              Adds <code id="seal-addr">seal@witnessed.cc</code> to Bcc on every
              new compose
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-inject" />
            <span class="slider" aria-hidden="true"></span>
          </label>
        </div>
      </section>

      <!-- Build footer. The version string is stamped by popup.ts from
           chrome.runtime.getManifest().version so it can never drift from
           the manifest the user actually installed. Useful when a user
           reports a bug and we need to know which build they're on. -->
      <footer class="foot">
        <a class="foot-link" href="https://witnessed.cc" target="_blank" rel="noopener">
          witnessed.cc
        </a>
        <span class="foot-sep" aria-hidden="true">·</span>
        <span class="foot-version" id="version-tag">v—</span>
      </footer>
    </main>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
