<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Witnessed</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main>
      <header class="head">
        <div class="brand">WITNESSED</div>
        <div class="tag">Auto-seal Gmail</div>
      </header>

      <section class="toggle-row">
        <div>
          <div class="toggle-label">Seal new emails</div>
          <div class="toggle-sub">Adds <code id="seal-addr">seal@witnessed.cc</code> to Bcc</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle" />
          <span class="slider" aria-hidden="true"></span>
        </label>
      </section>

      <section class="stat-row">
        <div class="stat">
          <div class="stat-num" id="count">0</div>
          <div class="stat-label">sealed from this browser</div>
        </div>
      </section>

      <section class="tips" id="tips">
        <p>Open Gmail. Every new compose gets <code>seal@witnessed.cc</code> in Bcc. Remove it on any individual email you don't want recorded.</p>
      </section>

      <footer class="links">
        <a id="home" href="#" target="_blank" rel="noopener">witnessed.cc</a>
        <span class="dot"></span>
        <a id="setup" href="#" target="_blank" rel="noopener">Setup guide</a>
      </footer>
    </main>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
